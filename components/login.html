<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Login | Lumière Studios</title>
    <meta name="description" content="Access your private gallery and event photos. Login to Lumière Studios client portal.">
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="login.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <nav id="main-nav" class="scrolled">
        <div class="container">
            <div class="logo">
                <a href="../index.html" style="text-decoration: none; text-align: center;">
                    <span class="logo-main">LUMIÈRE</span>
                    <span class="logo-sub">STUDIOS</span>
                </a>
            </div>
            <ul class="nav-links">
                <li><a href="../index.html">HOME</a></li>
                <li><a href="portfolio.html">PORTFOLIO</a></li>
                <li><a href="login.html" class="active">CLIENT LOGIN</a></li>
                <li><a href="live-event.html">LIVE EVENT</a></li>
                <li><a href="../index.html#admin" class="btn-admin">ADMIN</a></li>
            </ul>
            <div class="mobile-menu-btn">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>

    <main class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h2>Client Portal</h2>
                <p>Welcome back, please enter your details</p>
            </div>

            <form id="login-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" class="form-input" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-input" placeholder="••••••••" required>
                </div>

                <div class="form-options">
                    <label style="display: flex; align-items: center; gap: 8px; cursor: pointer; color: var(--text-dim);">
                        <input type="checkbox" style="accent-color: var(--primary-gold);"> Remember me
                    </label>
                    <a href="#" class="forgot-password">Forgot Password?</a>
                </div>

                <button type="submit" class="btn btn-primary btn-login">Sign In</button>
            </form>

            <div class="divider">or</div>

            <button class="google-login-btn">
                <i class="fab fa-google"></i>
                Continue with Google
            </button>

            <div class="signup-link">
                Don't have an account? <a href="#">Contact us</a> to get started.
            </div>
        </div>
    </main>

    <footer style="padding: 40px 0; text-align: center; color: var(--text-dim); font-size: 12px; letter-spacing: 1px;">
        <div class="container">
            <p>&copy; 2024 LUMIÈRE STUDIOS. ALL RIGHTS RESERVED.</p>
        </div>
    </footer>

    <script src="../app.js"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            alert('Login functionality will be connected to Firebase soon!');
        });

        document.querySelector('.google-login-btn').addEventListener('click', () => {
            alert('Google Login will be implemented via Firebase Auth!');
        });

        document.querySelector('.forgot-password').addEventListener('click', (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            if (!email) {
                alert('Please enter your email address to reset your password.');
            } else {
                alert(`A password reset link has been sent to ${email}`);
            }
        });
    </script>
</body>
</html>
